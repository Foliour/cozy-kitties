# =============================================================================
# PLANTS - Multi-stage growth sprites
# Each plant has 4 growth stages (0-3)
# =============================================================================
plants:
  pothos:
    id: "plant_pothos"
    display_name: "Pothos"
    type: multi_stage
    stages:
      - stage: 0
        file: "Sprites/Plants/pothos_stage0.png"
        size: {width: 32, height: 32}
        description: "Small sprout"
      - stage: 1
        file: "Sprites/Plants/pothos_stage1.png"
        size: {width: 32, height: 48}
        description: "Small plant"
      - stage: 2
        file: "Sprites/Plants/pothos_stage2.png"
        size: {width: 48, height: 64}
        description: "Medium plant with trailing vines"
