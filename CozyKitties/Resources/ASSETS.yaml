# =============================================================================
# AUDIO
# =============================================================================
audio:
  purr:
    id: "audio_purr"
    file: "Audio/purr.mp3"
    type: sfx
    duration_seconds: 2.5
    notes: "Cat purring sound for tapping cats"

  meow:
    id: "audio_meow"
    file: "Audio/meow.mp3"
    type: sfx
    duration_seconds: 1.0
    notes: "Cat meow sound for interactions"

  rain_ambience:
    id: "audio_rain"
    file: "Audio/rain_ambience.mp3"
    type: music
    loop: true
    notes: "Ambient rain for rainy/stormy weather"

  cozy_music:
    id: "audio_cozy"
    file: "Audio/cozy_music.mp3"
    type: music
    loop: true
    notes: "Optional background lo-fi music"

# =============================================================================
# PLACEHOLDER INFO - Assets not yet acquired
# =============================================================================
placeholders:
  notes: |
    The following assets need to be purchased from Itch.io or created:
    - All cat sprites (10 cats x idle/sleep/play animations)
    - All plant sprites (5 plants x 4 growth stages)
    - Apartment tileset and scene
    - Weather overlays
    - UI icons (can use SF Symbols as fallback)
    - Audio files

    When purchasing from Itch.io:
    1. Download the asset pack
    2. Create mapping from source files to our IDs
    3. Copy files to appropriate Sprites/ subdirectory
    4. Update this manifest with actual file paths and frame data
    5. Update sources section with attribution

# =============================================================================
# ASSET SOURCES - Licensing and attribution
# =============================================================================
sources:
  - name: "Cat Sprites"
    artist: "Carysaurus"
    url: "https://itch.io"
    license: "Purchased"
    used_for: ["trouble", "shadow", "marmalade", "luna", "biscuit", "pepper", "olive"]
    cat_types:
      - BlackCat
      - BrownCat
      - OrangeTabby
      - SiameseCat
      - TuxedoCat
      - WhiteCat
    notes: |
      Sprite sheets for cats. Each cat has multiple actions.
      Actions included: Attack, Crouch, Eat, Idle, Jump, Meow, Pounce, Run, Sit, Sleep
      Actions excluded from game: Death, Hurt
      Frame size: 32x48 pixels per frame (horizontal strip layout)
