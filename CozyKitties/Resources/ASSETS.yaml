# =============================================================================
# SCENE - Apartment background and tilemap
# =============================================================================
scene:
  backyard:
    id: "scene_backyard"
    type: tilemap
    tiled_file: "Scenes/backyard.tmx"
    exported_json: "Scenes/backyard.json"
    tile_size: {width: 16, height: 16}
    map_size: {width: 50, height: 60}
    pixel_size: {width: 800, height: 960}
    viewport:
      pan_enabled: true
      zoom_enabled: false
      scale: 2  # Pixel art scale
    tilesets:
      - name: "terrain"
        file: "Scenes/gentle forest v01.png"
        tile_size: {width: 16, height: 16}
      - name: "trees"
        file: "Scenes/gentle trees 80x96 v01.png"
        tile_size: {width: 80, height: 96}
      - name: "waterfall"
        file: "Scenes/gentle waterfall A v01.png"
        tile_size: {width: 16, height: 16}
        animated: true
      - name: "water_sparkles"
        file: "Scenes/gentle water sparkles A v01.png"
        tile_size: {width: 16, height: 16}
        animated: true
      - name: "buildings"
        file: "Scenes/iconic_homestead v1.png"
        tile_size: {width: 16, height: 16}
      - name: "interiors"
        file: "Scenes/iconic interiors.png"
        tile_size: {width: 16, height: 16}
    layers:
      - name: "Ground"
        z_index: 0
        type: tile_layer
      - name: "Paths"
        z_index: 1
        type: tile_layer
      - name: "Objects"
        z_index: 2
        type: tile_layer
      - name: "AbovePlayer"
        z_index: 3
        type: tile_layer
      - name: "Collisions"
        z_index: -1
        type: object_layer
      - name: "SpawnPoints"
        z_index: -1
        type: object_layer
      - name: "Transitions"
        z_index: -1
        type: object_layer
    notes: "Outdoor backyard scene. Larger than viewport - supports panning. See SCENE_SPEC.yaml for details."

# =============================================================================
# WEATHER - Sky colors (sprites not yet acquired)
# Maps to WeatherState enum: sunny, partlyCloudy, overcast, gentleRain
# =============================================================================
weather:
  sunny:
    id: "weather_sunny"
    type: color
    color: "#87CEEB"  # Sky blue
    decibels: "<60 dB"
    notes: "Bright sunny sky - calm environment"

  partlyCloudy:
    id: "weather_partly_cloudy"
    type: color
    color: "#9CA3AF"  # Light gray
    decibels: "60-70 dB"
    notes: "Partly cloudy - moderate ambient noise"

  overcast:
    id: "weather_overcast"
    type: color
    color: "#6B7280"  # Darker gray
    decibels: "70-80 dB"
    notes: "Overcast sky - noisier environment"

  gentleRain:
    id: "weather_gentle_rain"
    type: color
    color: "#374151"  # Dark gray-blue
    decibels: ">80 dB"
    notes: "Gentle rain - loud ambient noise (still cozy!)"

