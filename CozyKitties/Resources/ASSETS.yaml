# ASSETS.yaml - Cozy Kitties Asset Manifest
# =============================================================================
# SINGLE SOURCE OF TRUTH for all game assets
#
# IMPORTANT FOR AGENTS:
# - READ THIS FILE before creating or modifying ANY assets
# - If an asset isn't here, it doesn't exist
# - To add an asset: add entry here FIRST, then add the file
# - To modify an asset: update metadata here, keep same file path
# - NEVER create new files for existing entities
# =============================================================================

version: "1.0"
last_updated: "2026-03-07"

